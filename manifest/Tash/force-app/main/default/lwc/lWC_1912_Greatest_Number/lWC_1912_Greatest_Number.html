<template>
    <lightning-card title="Greatest Number Finder">
        <p>This is the record ID in LWC: {recordId}</p>
        <lightning-input label="First Number" type="text" onchange={handleFirstNumberChange}></lightning-input>
        <lightning-input label="Second Number" type="text" onchange={handleSecondNumberChange}></lightning-input>
        <lightning-input label="Third Number" type="text" onchange={handleThirdNumberChange}></lightning-input>
        
        <lightning-button label="Find Greatest Number" onclick={findGreatestNumber}></lightning-button> <br/><br/>
        <p>-------output--------</p>
        <p>First Number: {firstNumber}</p>
        <p>Second Number: {secondNumber}</p>
        <p>Third Number: {thirdNumber}</p>
        <p>Greatest Number: {greatestNumber}</p>
    </lightning-card>

</template>

<template>
    <lightning-card title ="Create Contact" >
        <div class = "slds-m-around_medium">
            <lightning-input type = "text" label = "First Name" value = {firstName} onchange = {handleFirstNameChange}>
            </lightning-input>
            <lightning-input type = "text" label = "Last Name" value = {lastName} onchange = {handleLastNameChange}>
            </lightning-input>
            <lightning-input type = "email" label = "Email" value = {email} onchange = {handleEmailChange}>
            </lightning-input>
            <lightning-button variant = "brand" label = "Create Contact" onclick = {createContact}>
            </lightning-button>
        </div>
    </lightning-card>

    
</template>
